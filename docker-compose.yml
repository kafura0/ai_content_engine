services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_content_engine_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-anthropic/claude-3-5-haiku}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-google/gemini-2.0-flash-exp:free}
      DATABASE_URL: ${DATABASE_URL}
      IMAGE_RETRY_COUNT: ${IMAGE_RETRY_COUNT:-3}
      # Points to the n8n container by service name — works inside Docker network
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/generate-content}
      # Optional — leave empty for dev mode (no auth required)
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      n8n:
        condition: service_started

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked in at build time — use localhost for local testing,
        # your real domain for production builds
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        # Optional — leave empty to run in dev mode (no login required)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    container_name: ai_content_engine_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── n8n workflow automation ───────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ai_content_engine_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Auth — set to true and add N8N_BASIC_AUTH_USER/PASSWORD to secure in prod
      N8N_BASIC_AUTH_ACTIVE: "false"
      # Allow $env.VAR expressions in HTTP Request nodes (used by workflow.json)
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: ${TIMEZONE:-UTC}
      # Disable secure-cookie requirement so the UI works over plain HTTP locally
      N8N_SECURE_COOKIE: "false"
      # These are read by the workflow via $env.* and process.env.*
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-anthropic/claude-3-5-haiku}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-google/gemini-2.0-flash-exp:free}
      # Backend URL reachable inside the Docker network
      BACKEND_URL: http://api:8000
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
